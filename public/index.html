<div id="gameScreen" class="screen game-container">
    <div class="game-header">
        <div class="timer" id="timer">90</div>
        <div class="prompt-box" id="promptText">LOADING TICKET...</div>
    </div>

    <div class="workspace">
        <h3>YOUR RESPONSE:</h3>
        <div id="corkboard">
            <span id="emptyMsg" class="corkboard-placeholder">Pin scraps here...</span>
        </div>
        <button onclick="submitNote()" class="btn-resolve">RESOLVE TICKET</button>
    </div>

    <div class="scraps-drawer">
        <h3>OFFICE SCRAPS:</h3>
        <div id="wordBank"></div>
    </div>
</div> <div id="votingScreen" class="screen">
    <h1>QUALITY ASSURANCE</h1>
    <p class="ui-subtext">SELECT THE MOST "PROFESSIONAL" RESPONSE:</p>
    <div class="prompt-box" id="votePrompt"></div>
    <div id="submissionsList"></div>
</div>

<div id="resultScreen" class="screen">
    <h1>TICKET STATUS</h1>
    <div class="prompt-box" id="winnerName" style="background:#fbc02d; color:#000;"></div>
    
    <div id="winningNote" class="winning-note-container"></div>
    
    <h3>EMPLOYEE PERFORMANCE</h3>
    <ul id="scoreList" style="list-style: none; padding:0; font-size: 1.3rem;"></ul>
    <button id="nextRoundBtn" class="host-only" onclick="startNextRound()">OPEN NEXT TICKET</button>
    <p id="waitingMsg" style="display:none; font-weight:bold;">WAITING FOR HOST TO OPEN NEXT TICKET...</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
